<!DOCTYPE html>
<html>
<head>
    <title>Test Firebase 4 Channels</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        .btn-on { padding: 10px 20px; font-size: 16px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .btn-off { padding: 10px 20px; font-size: 16px; background-color: #f44336; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .channel-box { margin-bottom: 20px; padding: 15px; background-color: #f9f9f9; border: 1px solid #ddd; border-radius: 8px; display: inline-block; width: 300px; }
    </style>
</head>
<body style="font-family: Arial; text-align: center; margin-top: 30px;">

    <h2>ทดสอบ Web App สั่งการ 4 Channels</h2>
    <p id="statusText" style="color: blue; font-weight: bold;">สถานะ: รอการสั่งงาน...</p>

    <div class="channel-box">
        <h3>Channel 1</h3>
        <button class="btn-on" onclick="controlDevice(1, 1)">ON (1)</button>
        <button class="btn-off" onclick="controlDevice(1, 0)">OFF (0)</button>
    </div><br>

    <div class="channel-box">
        <h3>Channel 2</h3>
        <button class="btn-on" onclick="controlDevice(2, 1)">ON (1)</button>
        <button class="btn-off" onclick="controlDevice(2, 0)">OFF (0)</button>
    </div><br>

    <div class="channel-box">
        <h3>Channel 3</h3>
        <button class="btn-on" onclick="controlDevice(3, 1)">ON (1)</button>
        <button class="btn-off" onclick="controlDevice(3, 0)">OFF (0)</button>
    </div><br>

    <div class="channel-box">
        <h3>Channel 4</h3>
        <button class="btn-on" onclick="controlDevice(4, 1)">ON (1)</button>
        <button class="btn-off" onclick="controlDevice(4, 0)">OFF (0)</button>
    </div>

    <script>
        // 1. ตั้งค่า Firebase
        var firebaseConfig = {
            apiKey: "AIzaSyCXKM44f0JodWD_mdUytWOQWScSs1vgAcE",
            databaseURL: "https://mynut095-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        
        // 2. เริ่มต้นการเชื่อมต่อ
        firebase.initializeApp(firebaseConfig);
        var database = firebase.database();

        // 3. ฟังก์ชันหลักสำหรับควบคุมทุก Channel
        function controlDevice(channelNumber, value) {
            // สร้าง Path เช่น /SmartHome/CH1, /SmartHome/CH2
            var path = '/SmartHome/CH' + channelNumber; 
            
            database.ref(path).set(value)
            .then(() => {
                // อัปเดตข้อความบนหน้าเว็บให้รู้ว่าส่งสำเร็จ
                var stateName = value === 1 ? "ON" : "OFF";
                document.getElementById('statusText').innerText = 
                    "ส่งคำสั่ง " + stateName + " ไปที่ Channel " + channelNumber + " สำเร็จ!";
            })
            .catch((error) => {
                document.getElementById('statusText').innerText = "เกิดข้อผิดพลาด: " + error;
            });
        }
    </script>

</body>
</html>
