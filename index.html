<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART HOME - IOT CONTROL PANEL</title>
    <style>
        /* ตั้งค่าพื้นฐานและพื้นหลัง */
        body {
            background-color: #0b111e; /* สีพื้นหลังสไตล์ Dark */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* โครงสร้างกล่องหลัก (Card) */
        .control-panel {
            background-color: #151b29;
            width: 100%;
            max-width: 380px;
            padding: 30px 20px;
            border-radius: 20px;
            border: 2px solid #00f2fe; /* ขอบสีฟ้า */
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        /* ส่วนหัวเรื่อง */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #00f2fe;
            margin: 0;
            font-size: 24px;
            letter-spacing: 1.5px;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }
        .header p {
            color: #8c98a4;
            margin: 5px 0 0 0;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        /* กล่องของแต่ละช่อง (Channel Row) */
        .channel-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1a2235;
            padding: 15px 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .channel-info {
            display: flex;
            align-items: center;
            font-size: 16px;
            font-weight: 500;
        }
        .channel-info span.icon {
            margin-right: 15px;
            font-size: 20px;
        }

        /* CSS สำหรับปุ่ม Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #2c3e50;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #3b82f6; /* สีเมื่อเปิด */
        }
        input:checked + .slider:before {
            transform: translateX(24px);
        }

        /* ส่วนท้าย (Footer) */
        .footer {
            margin-top: 30px;
            text-align: center;
            border-top: 1px dashed #2c3e50;
            padding-top: 20px;
        }
        .footer .role { color: #00f2fe; font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        .footer .name { font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        .footer .school { color: #8c98a4; font-size: 12px; }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="header">
            <h1>SMART HOME</h1>
            <p>ESP8266 IOT CONTROL PANEL</p>
        </div>

        <div class="channel-row">
            <div class="channel-info"><span class="icon">💡</span> ช่องที่ 1 (D1)</div>
            <label class="switch">
                <input type="checkbox" id="ch1">
                <span class="slider"></span>
            </label>
        </div>

        <div class="channel-row">
            <div class="channel-info"><span class="icon">🌀</span> ช่องที่ 2 (D2)</div>
            <label class="switch">
                <input type="checkbox" id="ch2">
                <span class="slider"></span>
            </label>
        </div>

        <div class="channel-row">
            <div class="channel-info"><span class="icon">📺</span> ช่องที่ 3 (D5)</div>
            <label class="switch">
                <input type="checkbox" id="ch3">
                <span class="slider"></span>
            </label>
        </div>

        <div class="channel-row">
            <div class="channel-info"><span class="icon">🔌</span> ช่องที่ 4 (D6)</div>
            <label class="switch">
                <input type="checkbox" id="ch4">
                <span class="slider"></span>
            </label>
        </div>

        <div class="footer">
            <div class="role">ผู้พัฒนาระบบ</div>
            <div class="name">นายปฐมพร นาดี</div>
            <div class="school">สาขาอิเล็กทรอนิกส์ วิทยาลัยสารพัดช่างศรีสะเกษ</div>
        </div>
    </div>

    <script type="module">
        // 1. นำเข้า Firebase SDK
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // 2. ตั้งค่า Firebase Config ของคุณ (นำมาจาก Firebase Console)
        // ⚠️ สำคัญ: นำค่าจากโปรเจ็กต์ของคุณมาแทนที่ตรงนี้ทั้งหมด
        const firebaseConfig = {
            apiKey: "AIzaSyCXKM44f0JodWD_mdUytWOQWScSs1vgAcE",
  authDomain: "mynut095.firebaseapp.com",
  databaseURL: "https://mynut095-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mynut095",
  storageBucket: "mynut095.firebasestorage.app",
  messagingSenderId: "489025440767",
  appId: "1:489025440767:web:d1817175c2148ac92bf5ca",
        };

        // 3. เริ่มต้นการทำงานของ Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Path ในฐานข้อมูล (กำหนดชื่อ Node หลัก เช่น "SmartHome")
        const dbPath = "SmartHome"; 

        // 4. ฟังก์ชันสำหรับรับค่าจากสวิตช์หน้าเว็บ แล้วส่งไปอัปเดตบน Firebase
        function setupToggle(elementId, dbChildNode) {
            const toggleElement = document.getElementById(elementId);
            
            // เมื่อมีการคลิกเปลี่ยนสถานะสวิตช์
            toggleElement.addEventListener('change', (e) => {
                const status = e.target.checked; // จะได้ค่า true หรือ false
                set(ref(db, `${dbPath}/${dbChildNode}`), status)
                    .then(() => console.log(`${dbChildNode} set to ${status}`))
                    .catch((error) => console.error("Error updating data: ", error));
            });

            // รอรับค่าที่อัปเดตจาก Firebase เพื่อมาแสดงผลบนหน้าเว็บให้ตรงกัน (Real-time sync)
            onValue(ref(db, `${dbPath}/${dbChildNode}`), (snapshot) => {
                const data = snapshot.val();
                if (data !== null) {
                    toggleElement.checked = data; // อัปเดตสวิตช์หน้าเว็บตามฐานข้อมูล
                }
            });
        }

        // 5. เรียกใช้ฟังก์ชันสำหรับทั้ง 4 ช่อง (เชื่อม id ของ html กับชื่อ node ใน firebase)
        setupToggle('ch1', 'Channel1'); // ช่อง 1 จะถูกเก็บที่ SmartHome/Channel1
        setupToggle('ch2', 'Channel2'); // ช่อง 2 จะถูกเก็บที่ SmartHome/Channel2
        setupToggle('ch3', 'Channel3'); // ช่อง 3 จะถูกเก็บที่ SmartHome/Channel3
        setupToggle('ch4', 'Channel4'); // ช่อง 4 จะถูกเก็บที่ SmartHome/Channel4

    </script>
</body>
</html>
